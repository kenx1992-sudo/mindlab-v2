name: "iOS Build"

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        type: choice
        options:
          - development
          - adhoc
          - appstore
        default: "development"

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend-src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend-src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build iOS
        working-directory: frontend-src/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ${{ github.workspace }}/build/Mindlab.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" 

      - name: Export IPA
        run: |
          mkdir -p ${{ github.workspace }}/build/Payload
          cp -R ${{ github.workspace }}/build/Mindlab.xcarchive/Products/Applications/Mindlab.app ${{ github.workspace }}/build/Payload/
          cd ${{ github.workspace }}/build
          zip -r Mindlab.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: mindlab-ios-unsigned
          path: build/Mindlab.ipa

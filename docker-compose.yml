version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mindlab
      POSTGRES_USER: mindlab
      POSTGRES_PASSWORD: mindlab_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend-src/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - natsdata:/data

  backend:
    build:
      context: ./backend-src
      dockerfile: Dockerfile.backend
    ports:
      - "8090:8080"
    environment:
      PORT: "8080"
      APP_REGION: "HK"
      GIN_MODE: "debug"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: mindlab
      DB_USER: mindlab
      DB_PASSWORD: mindlab_dev
      REDIS_ADDR: redis:6379
      NATS_ADDR: nats:4222
      LLM_BASE_URL: https://ark.cn-beijing.volces.com/api/coding/v3
      LLM_API_KEY: ark-9e6f365f-a34c-4f56-914b-da1bf6983696-0cb2c
      LLM_MODEL: deepseek-v4-pro
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      KB_PATH: /app/knowledge-base
    volumes:
      - ./knowledge-base:/app/knowledge-base:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend-src
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8090"
      NEXT_PUBLIC_REGION: "HK"
      NEXT_PUBLIC_LOCALE: "zh-HK"
      NEXT_PUBLIC_WS_URL: "ws://localhost:8090"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  natsdata:


apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindlab-frontend
  labels:
    app: mindlab-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mindlab-frontend
  template:
    metadata:
      labels:
        app: mindlab-frontend
    spec:
      containers:
        - name: frontend
          image: mindlab-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: mindlab-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mindlab-frontend
spec:
  selector:
    app: mindlab-frontend
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP

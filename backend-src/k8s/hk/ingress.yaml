# 🇭🇰 Hong Kong Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mindlab-ingress
  namespace: mindlab-hk
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hk.mindlab.ai
        - api-hk.mindlab.ai
      secretName: mindlab-hk-tls
  rules:
    - host: hk.mindlab.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mindlab-frontend
                port:
                  number: 80
    - host: api-hk.mindlab.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mindlab-backend
                port:
                  number: 80

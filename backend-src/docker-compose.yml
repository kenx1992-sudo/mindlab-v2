version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mindlab
      POSTGRES_USER: mindlab
      POSTGRES_PASSWORD: mindlab_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - natsdata:/data

  mindlab-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      APP_REGION: "HK"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: mindlab
      DB_USER: mindlab
      DB_PASSWORD: mindlab_dev
      REDIS_ADDR: redis:6379
      NATS_ADDR: nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started

volumes:
  pgdata:
  natsdata:
